<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Todo App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <h1>Create Account</h1>
      <p class="auth-subtitle">Start managing your todos with reminders.</p>

      <form id="auth-form" class="auth-form" autocomplete="off">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" minlength="6" required />

        <button type="submit">Sign Up</button>
      </form>

      <p id="auth-message" class="auth-message" aria-live="polite"></p>
      <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
