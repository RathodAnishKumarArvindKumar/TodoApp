services:
  - type: web
    name: todoapp
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /data/todo.sqlite
    disk:
      name: todo-data
      mountPath: /data
      sizeGB: 1
